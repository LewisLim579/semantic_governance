domain: station_sales
concepts:
- label: 가격할인
  description: 거래조건에 따라 제공되는 단가 할인(기본 거래조건, 주문 시 적용되는 고정 가격)
  unit: 원/kg
  aliases:
  - 할인단가
  note: 매출할인과 구분 필요. 할인 유형별 분리(가격할인/추가가격할인 등)
  kind: measure
  id: PriceDiscount
  source:
    doc: 데이터 항목 정의서, 1.2 가격할인
- id: SalesDiscountAmount
  label: 매출할인(금액)
  kind: measure
  unit: 원
  description: 월말 정산 시 매출 조정(시장가격 유지·공급가격 조절 목적)
  note: 각 지사별 사무서기가 수기로 계산·입력(6.3)
  source:
    doc: 데이터 항목 정의서, 1.2 매출할인(금액)
- id: LandTransportAmount
  label: 육상수송비(금액)
  kind: measure
  unit: 원
  description: 충전소 공급 관련 육상 운송 비용(거래처 도착도 기준)
  note: 배부 기준 확인 필요(6.5)
  source:
    doc: 데이터 항목 정의서, 1.2 육상수송비
- id: SeaTransportAmount
  label: 해상수송비(금액)
  kind: measure
  unit: 원
  description: 충전소 공급 관련 해상 운송 비용(거래처 도착도 기준)
  source:
    doc: 데이터 항목 정의서, 1.2 해상수송비
- id: AdditionalTransport
  label: 추가수송비
  kind: measure
  unit: 원
  description: 거래처별 LPG 고객 운송비 할증 단가(거래처 지원 목적 포함)
  source:
    doc: 데이터 항목 정의서, 1.2 추가수송비
- id: LoanAmount
  label: 대여금(금액)
  kind: measure
  unit: 원
  description: 거래처 대상 지원된 자금(Lock-in 효과, 대여금 계약기간이 우선)
  source:
    doc: 데이터 항목 정의서, 1.2 대여금
- id: ReceivableAmount
  label: 외상채권(금액)
  kind: measure
  unit: 원
  description: 거래처 간 발생한 매출채권(MP가격·물량 기반 수준 평가)
  note: 연간 사내이자율 변경(6.1)
  source:
    doc: 데이터 항목 정의서, 1.2 외상채권
- id: FacilitySupportBalance
  label: 시설지원잔액(금액)
  kind: measure
  unit: 원
  description: '거래처 대상 지원된 시설의 장부가격(예: 세차기)'
  note: 연간 사내이자율 변경(6.1)
  source:
    doc: 데이터 항목 정의서, 1.2 시설지원잔액
- id: RentIncomeAmount
  label: 임대료(금액)
  kind: measure
  unit: 원
  description: 당사가 수취하는 임대료(월세)
  note: TMC 계산 시 (−) 부호 적용(6.2)
  source:
    doc: 데이터 항목 정의서, 1.2 임대료
- id: RentExpenseAmount
  label: 임차료(금액)
  kind: measure
  unit: 원
  description: 당사가 지불하는 임차료(월세)
  source:
    doc: 데이터 항목 정의서, 1.2 임차료
- id: DepositOpportunityCost
  label: 임대차보증금기회비용(금액)
  kind: measure
  unit: 원
  description: 당사가 지급/수취한 보증금의 기회비용
  formula: (임차보증금 − 임대보증금) × InternalInterestRate
  note: 연간 사내이자율 변경(6.1)
  source:
    doc: 데이터 항목 정의서, 1.2 임대차보증금기회비용 / 4.#8
- id: SalesDiscountUnit
  label: 매출할인(단가)
  kind: measure
  unit: 원/kg
  formula: SalesDiscountAmount / SalesVolume
  source:
    doc: 데이터 항목 정의서, 1.1 단가 환산 항목
- id: LandTransportUnit
  label: 육상수송비(단가)
  kind: measure
  unit: 원/kg
  formula: LandTransportAmount / SalesVolume
  note: 배부 기준 확인 필요
  source:
    doc: 데이터 항목 정의서, 1.1 단가 환산 항목
- id: SeaTransportUnit
  label: 해상수송비(단가)
  kind: measure
  unit: 원/kg
  formula: SeaTransportAmount / SalesVolume
  source:
    doc: 데이터 항목 정의서, 1.1 단가 환산 항목
- id: AdditionalTransportUnit
  label: 추가수송비(단가)
  kind: measure
  unit: 원/kg
  formula: AdditionalTransport / SalesVolume
  source:
    doc: 데이터 항목 정의서, 1.1 / 4.#2 수송비
- id: LoanUnit
  label: 대여금(단가)
  kind: measure
  unit: 원/kg
  formula: (LoanAmount × InternalInterestRate) / SalesVolume / N
  source:
    doc: 데이터 항목 정의서, 1.1 단가 환산 항목
- id: ReceivableUnit
  label: 외상채권(단가)
  kind: measure
  unit: 원/kg
  formula: (ReceivableAmount × InternalInterestRate) / SalesVolume / N
  source:
    doc: 데이터 항목 정의서, 1.1 단가 환산 항목
- id: FacilitySupportUnit
  label: 시설지원잔액(단가)
  kind: measure
  unit: 원/kg
  formula: (FacilitySupportBalance × InternalInterestRate) / SalesVolume / N
  source:
    doc: 데이터 항목 정의서, 1.1 단가 환산 항목
- id: RentIncomeUnit
  label: 임대료(단가)
  kind: measure
  unit: 원/kg
  formula: RentIncomeAmount / SalesVolume
  note: TMC 계산 시 (−) 적용
  source:
    doc: 데이터 항목 정의서, 1.1 단가 환산 항목
- id: RentExpenseUnit
  label: 임차료(단가)
  kind: measure
  unit: 원/kg
  formula: RentExpenseAmount / SalesVolume
  source:
    doc: 데이터 항목 정의서, 1.1 단가 환산 항목
- id: DepositOpportunityCostUnit
  label: 임대차보증금기회비용(단가)
  kind: measure
  unit: 원/kg
  formula: DepositOpportunityCost / SalesVolume / N
  source:
    doc: 데이터 항목 정의서, 1.1 단가 환산 항목
- id: FundRentExpense
  label: 펀드임차료
  kind: measure
  unit: 원/kg
  description: 당사 펀드충전소 대상 지급하는 임차료(분기 단위)
  note: 내부관리 TMC 산정 시 임차료에서 펀드임차료는 제외(6.4). 펀드충전소 총 42개(ERP 구분, 변동 가능)
  source:
    doc: 데이터 항목 정의서, 1.1 펀드임차료
- id: MC
  label: 할인단가(MC)
  kind: measure
  unit: 원/kg
  formula: PriceDiscount + SalesDiscountUnit
  source:
    doc: 데이터 항목 정의서, 4.#1 MC
- id: TransportCost
  label: 수송비
  kind: measure
  unit: 원/kg
  formula: LandTransportUnit + SeaTransportUnit + AdditionalTransportUnit
  source:
    doc: 데이터 항목 정의서, 4.#2 수송비
- id: SupportOpportunityCost
  label: 지원기회비용
  kind: measure
  unit: 원/kg
  formula: LoanUnit + ReceivableUnit + FacilitySupportUnit
  source:
    doc: 데이터 항목 정의서, 4.#3 지원기회비용
- label: 임대손익
  unit: 원/kg
  formula: (− RentIncomeUnit) + RentExpenseUnit + DepositOpportunityCostUnit
  note: 임대료는 (−), 임차료·보증금기회비용은 (+) (6.2)
  kind: measure
  id: RentProfitLoss
  source:
    doc: 데이터 항목 정의서, 4.#4 임대손익
- id: TMC
  label: TMC
  kind: measure
  unit: 원/kg
  description: 대리점과의 거래관계에서 발생하는 당사 모든 비용의 합(충전소 수익성 핵심 지표)
  aliases:
  - Total Marketing Price
  aggregation: 월별/충전소별
  formula: MC + TransportCost + SupportOpportunityCost + RentProfitLoss
  note: BIS TMC 화면 기준. 산식·포함 항목 확인 필요. 기준기간 최근 3개년
  source:
    doc: 데이터 항목 정의서, 1.1 TMC / 2.1 / 4.#5
- id: ContributionMarginUnit
  label: 공헌이익단가
  kind: measure
  unit: 원/kg
  description: 당사 대리점 영업 손익 분기점(거래처 할인 총액이 이 값을 초과하면 손익 (−) 전환)
  aggregation: 연별
  values_by_year:
    '2024': 199
    '2025': 210
    '2026': 215
  note: 연간 단위로 변경됨(6.1) — 계산 시점 기준값 확인 필수
  source:
    doc: 데이터 항목 정의서, 1.1 공헌이익단가
- id: ProfitContributionUnit
  label: 기여이익단가
  kind: measure
  unit: 원/kg
  description: 당사 kg당 마진
  formula: ContributionMarginUnit − TMC
  source:
    doc: 데이터 항목 정의서, 1.1 기여이익단가 / 4.#6
- id: ProfitContribution
  label: 기여이익
  kind: measure
  unit: 원
  description: 당사 총 손익
  aggregation: 월별/충전소별
  formula: ProfitContributionUnit × SalesVolume
  source:
    doc: 데이터 항목 정의서, 1.1 기여이익 / 4.#7
