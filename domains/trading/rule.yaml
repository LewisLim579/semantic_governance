# 거래(trading) 도메인 규칙(rule)
domain: trading

rules:
  - id: R-001
    label: 쿠폰 중복 적용 불가
    applies_to: Order
    constraint: "count(appliedCoupon) <= 1"
    severity: error                 # error(차단) / warning(경고)
    source: "쿠폰정책 v2.1, 3.2항"

  - id: R-002
    label: 최대 할인 한도
    applies_to: Order
    constraint: "totalDiscount <= amount * 0.3"
    severity: error
    source: "쿠폰정책 v2.1, 4.1항"
